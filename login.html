<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
<style>
    .back-btn{
    display: block;
    width: 100%;

    margin: 18px auto 10px auto;
    padding: 14px;

    text-align: center;
    text-decoration: none !important;

    border-radius: 14px;
    border: none;

    background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);

    color: white !important;

    font-size: 15px;
    font-weight: 700;

    cursor: pointer;

    box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);

    transition: 0.3s ease;

    box-sizing: border-box;
}

.back-btn:hover{
    color: white !important;
    text-decoration: none !important;

    transform: translateY(-2px);

    box-shadow: 0 8px 24px rgba(79, 172, 254, 0.55);
}
</style>


</head>

<body>

<div class="register-card">
    <h2>Login</h2>

    <form id="loginForm">

        <!-- EMAIL -->
        <label>Email</label>
        <input type="email" name="email" id="email">

        <!-- PASSWORD -->
        <label>Password</label>
        <input type="password" name="password" id="password">

        <!-- CAPTCHA -->
        <label>Captcha</label>

        <div class="captcha-box">
            <span id="captcha-text"></span>
            <span class="captcha-refresh" onclick="generateCaptcha()">↻</span>
        </div>

        <input type="text" name="captcha_input" id="captcha_input">

        <!-- ERROR DISPLAY AREA (IMPORTANT) -->
        <small id="error-box" style="color:red; display:block; margin-top:10px;"></small>

        <!-- LOGIN -->
        <input type="submit" value="Login">


        <p><a href="forgot_password.php">Forgot Password?</a></p>
        <p>Don't have account? <a href="register.html">Register</a></p>

    </form>
            <a href="user_dashboard.php" class="back-btn">
    ← Back to Dashboard
</a>

</div>

<script>

/* ================= CAPTCHA ================= */
function generateCaptcha(){

    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%";
    let captcha = "";

    for(let i=0;i<6;i++){
        captcha += chars.charAt(Math.floor(Math.random()*chars.length));
    }

    document.getElementById("captcha-text").textContent = captcha;

    fetch("login.php?set_captcha=" + encodeURIComponent(captcha));
}

window.onload = generateCaptcha;


/* ================= LOGIN AJAX ================= */
document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let formData = new FormData(this);

    let errorBox = document.getElementById("error-box");
    errorBox.innerHTML = "";

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "login.php", true);

    xhr.onload = function(){

        let res = JSON.parse(this.responseText);

        if(res.status === "error"){

            // show ALL errors below captcha
            res.message.forEach(msg => {
                errorBox.innerHTML += "• " + msg + "<br>";
            });
        }

        if(res.status === "success"){
            window.location.href = res.redirect;
        }
    };

    xhr.send(formData);
});

</script>

</body>
</html>
