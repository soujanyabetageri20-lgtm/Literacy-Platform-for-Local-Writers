<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    .back-btn{
    display: block;
    width: 100%;

    margin: 18px auto 10px auto;
    padding: 14px;

    text-align: center;
    text-decoration: none !important;

    border-radius: 14px;
    border: none;

    background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);

    color: white !important;

    font-size: 15px;
    font-weight: 700;

    cursor: pointer;

    box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);

    transition: 0.3s ease;

    box-sizing: border-box;
}

.back-btn:hover{
    color: white !important;
    text-decoration: none !important;

    transform: translateY(-2px);

    box-shadow: 0 8px 24px rgba(79, 172, 254, 0.55);
}
</style>
<body>

<div class="register-card">
    <h2>Register</h2>

    <form id="registerForm">

        <!-- FULL NAME -->
        <label>Full Name</label>
        <input type="text" id="fullname" name="fullname" required>
        <small id="name-error"></small>

        <!-- EMAIL -->
        <label>Email</label>
        <input type="email" id="email" name="email" required>
        <small id="email-error"></small>

        

        <!-- MOBILE -->
        <label>Mobile (+91)</label>
        <input type="text" id="mobile" name="mobile_no" maxlength="10" required>
        <small id="mobile-error"></small>

        <!-- GENDER -->
        <label>Gender</label>
        <div class="gender-group">
            <label><input type="radio" name="gender" value="Male" required> Male</label>
            <label><input type="radio" name="gender" value="Female"> Female</label>
            <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>

        <!-- PASSWORD -->
        <label>Password</label>
        <input type="password" id="password" name="password" required>
        <small id="strength"></small>

        <!-- PASSWORD CHECKLIST -->
        <small id="checklist"></small>

        <!-- CONFIRM PASSWORD -->
        <label>Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <small id="confirm-error"></small>

        
        <!-- CAPTCHA -->
<label>Captcha</label>

<div class="captcha-box">

    <span id="captchaText"></span>

    <button type="button"
    id="refreshCaptcha">

    ↻

    </button>

</div>

<input type="text"
id="captchaInput"
placeholder="Enter captcha"
required>

<small id="captcha-error"></small>

<!-- SUBMIT MESSAGE -->
        <small id="submit-error"></small>


        <!-- BUTTONS -->
        <div class="btn-group">
            <input type="submit" value="Register">
            <button type="button" id="clearBtn">Clear</button>
        </div>
        <br>
        <p class="login-link">
            Already registered? <a href="login.html">Login here</a>
        </p>

    </form>
    <a href="user_dashboard.php" class="back-btn">
    ← Back to Dashboard
</a>
</div>

<script>

/* ================= CLEAR ================= */
document.getElementById("clearBtn").addEventListener("click", function () {
    document.getElementById("registerForm").reset();

    document.getElementById("name-error").textContent = "";
    document.getElementById("email-error").textContent = "";
    document.getElementById("mobile-error").textContent = "";
    document.getElementById("strength").textContent = "";
    document.getElementById("checklist").textContent = "";
    document.getElementById("confirm-error").textContent = "";
    document.getElementById("submit-error").textContent = "";
});


/* ================= NAME ================= */
document.getElementById("fullname").addEventListener("input", function () {

    let msg = document.getElementById("name-error");

    if (this.value === "") msg.textContent = "";
    else if (!/^[A-Za-z ]+$/.test(this.value)) {
        msg.textContent = "Only letters and spaces allowed";
        msg.style.color = "red";
    } else {
        msg.textContent = "Looks good";
        msg.style.color = "green";
    }
});


/* ================= EMAIL ================= */
document.getElementById("email").addEventListener("input", function () {

    let msg = document.getElementById("email-error");

    if (!this.value.endsWith("@gmail.com")) {
        msg.textContent = "Must be @gmail.com";
        msg.style.color = "red";
        return;
    }

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "register.php", true);
    xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");

    xhr.onload = function () {
        if (this.responseText === "exists") {
            msg.textContent = "Email already registered";
            msg.style.color = "red";
        } else {
            msg.textContent = "Email looks good";
            msg.style.color = "green";
        }
    };

    xhr.send("ajax=email_check&email=" + document.getElementById("email").value);
});


/* ================= MOBILE ================= */
document.getElementById("mobile").addEventListener("input", function () {

    let msg = document.getElementById("mobile-error");

    if (!/^[6789][0-9]{9}$/.test(this.value)) {
        msg.textContent = "Invalid mobile number";
        msg.style.color = "red";
    } else {
        msg.textContent = "Mobile looks good";
        msg.style.color = "green";
    }
});


/* ================= PASSWORD (FIXED + 3 LEVEL + CHECKLIST) ================= */
let password = document.getElementById("password");
let strength = document.getElementById("strength");
let checklist = document.getElementById("checklist");

let confirm_password = document.getElementById("confirm_password");
let confirmError = document.getElementById("confirm-error");

let pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,20}$/;

password.addEventListener("input", function () {

    let val = this.value;

    if (val === "") {
        strength.textContent = "";
        checklist.textContent = "";
        return;
    }

    /* ================= REQUIREMENT FAIL ================= */
    if (!pattern.test(val)) {
        strength.textContent = "Password does not meet requirements";
        strength.style.color = "red";

        checklist.innerHTML =
            "8 to 20 characters<br>" +
            "At least 1 uppercase<br>" +
            "At least 1 lowercase<br>" +
            "At least 1 number<br>" +
            "At least 1 special character";
        checklist.style.color = "red";

        return;
    }

    /* ================= CHECKLIST GREEN ================= */
    checklist.innerHTML =
        "All requirements satisfied";
    checklist.style.color = "green";

    /* ================= STRENGTH ================= */
    let score = 0;

    if (/[a-z]/.test(val)) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/\d/.test(val)) score++;
    if (/[\W_]/.test(val)) score++;

    if (val.length <= 10) {
        strength.textContent = "Weak password";
        strength.style.color = "orange";
    }
    else if (val.length <= 15) {
        strength.textContent = "Medium password";
        strength.style.color = "#2563eb";
    }
    else {
        strength.textContent = "Strong password";
        strength.style.color = "green";
    }

    checkMatch();
});


/* ================= CONFIRM PASSWORD (NO OVERWRITE FIXED) ================= */
function checkMatch() {

    if (confirm_password.value === "") {
        confirmError.textContent = "";
        return;
    }

    if (password.value !== confirm_password.value) {
        confirmError.textContent = "Passwords do not match";
        confirmError.style.color = "red";
    } else {
        confirmError.textContent = "Passwords matched";
        confirmError.style.color = "green";
    }
}

confirm_password.addEventListener("input", checkMatch);


/* ================= SUBMIT (NO REFRESH + NO OVERWRITE) ================= */
document.getElementById("registerForm").addEventListener("submit", function (e) {

    e.preventDefault();

    let formData = new FormData(this);
    let msg = document.getElementById("submit-error");

    /* CAPTCHA CHECK */

if(captchaInput.value !== currentCaptcha){

    msg.textContent =
    "Invalid captcha";

    msg.style.color = "red";

    return;
}

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "register.php", true);

    xhr.onload = function () {

        let res = JSON.parse(this.responseText);

        if (res.status === "error") {
            msg.textContent = res.message;
            msg.style.color = "red";
        }
        else {
            msg.textContent = "Registration successful. Redirecting...";
            msg.style.color = "green";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        }
    };

    xhr.send(formData);
});

/* ================= CAPTCHA ================= */

let captchaText =
document.getElementById("captchaText");

let captchaInput =
document.getElementById("captchaInput");

let captchaError =
document.getElementById("captcha-error");

let refreshCaptcha =
document.getElementById("refreshCaptcha");

let currentCaptcha = "";

function generateCaptcha(){

   let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*";

    currentCaptcha = "";

    for(let i=0;i<6;i++){

        currentCaptcha +=
        chars.charAt(
            Math.floor(Math.random()*chars.length)
        );
    }

    captchaText.textContent =
    currentCaptcha;
}

generateCaptcha();

/* REFRESH CAPTCHA */

refreshCaptcha.addEventListener("click",
function(){

    generateCaptcha();

    captchaInput.value = "";

    captchaError.textContent = "";
});

/* LIVE CAPTCHA VALIDATION */

captchaInput.addEventListener("input",
function(){

    if(captchaInput.value === ""){

        captchaError.textContent = "";
        return;
    }

    if(captchaInput.value !== currentCaptcha){

        captchaError.textContent =
        "Captcha does not match";

        captchaError.style.color =
        "red";
    }
    else{

        captchaError.textContent =
        "Captcha matched";

        captchaError.style.color =
        "green";
    }
});

</script>

</body>
</html>
